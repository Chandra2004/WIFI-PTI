name: Deploy to InfinityFree (FTP)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # --- NOTIFIKASI IN-PROGRESS ---
      - name: ⏳ Send In-Progress Notification
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          format: markdown
          message: |
            ⏳ *[DEPLOYMENT IN PROGRESS]*
            ------------------------------------------------
            *Service*      : `${{ github.repository }}`
            *Target Env*   : InfinityFree (Production)
            *Version*      : `${{ github.sha }}`
            *Triggered By* : @${{ github.actor }}

            *Status*       : 🧱 Building Environment & FTP Sync
            *Est. Time*    : ~2 minutes remaining
            ------------------------------------------------
            [📺 Track Live Progress](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})

      - name: 🚚 Get latest code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # DIPINDAHKAN KE ATAS AGAR GIT MASIH TERSEDIA
      - name: 📝 Extract Info for ChatOps
        id: info
        run: |
          echo "changed_files=$(git diff --name-only ${{ github.event.before }} ${{ github.sha }} | tr '\n' ', ')" >> $GITHUB_OUTPUT
          echo "commit_msg=$(git log -1 --pretty=%B | head -n 1)" >> $GITHUB_OUTPUT

      - name: ⏱️ Set Start Time
        run: echo "START_TIME=$(date +%s)" >> $GITHUB_ENV

      - name: 🐘 Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, bcmath, ctype, curl, dom, fileinfo, filter, hash, libxml, openssl, pcre, pdo, session, tokenizer, xml

      - name: 📦 Install PHP Dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader --no-dev

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 📦 Install NPM Dependencies & Build Assets
        run: |
          npm install --legacy-peer-deps
          npm run build

      - name: ⚙️ Prepare Environment
        env:
          PROD_EXTRAS: ${{ secrets.ENV_PROD_EXTRAS }}
        run: |
          echo "$PROD_EXTRAS" >> .env
          php artisan key:generate --force
          mkdir -p database
          touch database/database.sqlite

      - name: 🧹 Cleanup
        run: |
          rm -rf node_modules tests .git .github

      - name: 🚀 Sync Files via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: /htdocs/
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/tests/**

      - name: ⏱️ Calculate Duration
        if: always()
        run: |
          END_TIME=$(date +%s)
          DURATION=$((END_TIME - START_TIME))
          echo "DURATION_MIN=$((DURATION / 60))m $((DURATION % 60))s" >> $GITHUB_ENV

      # --- NOTIFIKASI SUCCESS ---
      - name: ✅ Send Professional Success Notification
        if: success()
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          format: markdown
          message: |
            🚀 *[PRODUCTION RELEASE] - SUCCESS*
            ------------------------------------------------
            *App*        : `${{ github.repository }}`
            *Branch*     : `${{ github.ref_name }}`
            *Author*     : @${{ github.actor }}
            *Status*     : Deployed to InfinityFree (FTP)
            *Duration*   : ${{ env.DURATION_MIN }}

            📝 *RELEASE CHANGELOG:*
            `${{ steps.info.outputs.commit_msg }}`

            📂 *File Updated:*
            `${{ steps.info.outputs.changed_files }}`
            ------------------------------------------------
            [🌐 Live App URL](http://${{ secrets.FTP_SERVER }})  [📈 View Logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})

      # --- NOTIFIKASI FAILED ---
      - name: 🚨 Send Professional Failure Notification
        if: failure()
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          format: markdown
          message: |
            🚨 *[PIPELINE ALERT] - BUILD FAILED*
            ------------------------------------------------
            *Project*     : `${{ github.repository }}`
            *Branch*      : `${{ github.ref_name }}`
            *Author*      : @${{ github.actor }}
            *Duration*    : ${{ env.DURATION_MIN }}

            ❌ *FAILED STAGE:* [Deployment-FTP]

            Error Summary:
            > Pipeline process terminated unexpectedly.
            > Periksa log di GitHub untuk detail error.

            ------------------------------------------------
            [🔍 View Failure Logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})  [🔄 Re-run Pipeline](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
