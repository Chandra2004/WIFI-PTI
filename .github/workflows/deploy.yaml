name: Deploy to InfinityFree (FTP)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 🚚 Get latest code
        uses: actions/checkout@v4

      - name: 🐘 Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, bcmath, ctype, curl, dom, fileinfo, filter, hash, libxml, openssl, pcre, pdo, session, tokenizer, xml

      - name: 📦 Install PHP Dependencies (Composer)
        run: composer install --no-interaction --prefer-dist --optimize-autoloader --no-dev

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 📦 Install NPM Dependencies & Build Assets (Vite)
        run: |
          npm install --legacy-peer-deps
          npm run build

      - name: ⚙️ Prepare Environment File
        env:
          PROD_EXTRAS: ${{ secrets.ENV_PROD_EXTRAS }}
        run: |
          echo "$PROD_EXTRAS" >> .env
          php artisan key:generate --force
          mkdir -p database
          touch database/database.sqlite

      - name: 🧹 Cleanup Unnecessary Files for Production
        run: |
          rm -rf node_modules
          rm -rf tests
          rm -rf .git
          rm -rf .github

      - name: 🚀 Sync Files via FTP to InfinityFree
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: /htdocs/
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/tests/**

      # --- BAGIAN NOTIFIKASI TELEGRAM ---

      - name: ✅ Send Success Notification
        if: success()
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          message: |
            🚀 *Deployment ke InfinityFree Berhasil!*

            Proyek: ${{ github.repository }}
            Branch: main
            Pesan Commit: ${{ github.event.head_commit.message }}

            Website sudah diperbarui di InfinityFree.

      - name: ❌ Send Failure Notification
        if: failure()
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          message: |
            ❌ *Deployment ke InfinityFree Gagal!*

            Proyek: ${{ github.repository }}
            Terjadi error saat proses deployment.
            Silakan cek log di sini:
            https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
