name: Deploy to InfinityFree (FTP)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 🚚 Get latest code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Penting untuk mendeteksi perubahan file di git diff

      - name: 🐘 Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, bcmath, ctype, curl, dom, fileinfo, filter, hash, libxml, openssl, pcre, pdo, session, tokenizer, xml

      - name: 📦 Install PHP Dependencies (Composer)
        run: composer install --no-interaction --prefer-dist --optimize-autoloader --no-dev

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 📦 Install NPM Dependencies & Build Assets (Vite)
        run: |
          npm install --legacy-peer-deps
          npm run build

      - name: ⚙️ Prepare Environment File
        env:
          PROD_EXTRAS: ${{ secrets.ENV_PROD_EXTRAS }}
        run: |
          echo "$PROD_EXTRAS" >> .env
          php artisan key:generate --force
          mkdir -p database
          touch database/database.sqlite

      - name: 🧹 Cleanup Unnecessary Files for Production
        run: |
          rm -rf node_modules
          rm -rf tests
          rm -rf .git
          rm -rf .github

      - name: 📝 Get Changed Files
        id: files
        run: |
          # Mengambil daftar file yang berubah antara commit terakhir dan sebelumnya
          echo "changed_files=$(git diff --name-only ${{ github.event.before }} ${{ github.sha }} | tr '\n' ', ')" >> $GITHUB_OUTPUT

      - name: 🚀 Sync Files via FTP to InfinityFree
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: /htdocs/
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/tests/**

      # --- NOTIFIKASI TELEGRAM ---

      - name: ✅ Send Success Notification
        if: success()
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          format: markdown
          message: |
            🚀 *Deployment ke InfinityFree Berhasil!*

            📦 *Proyek:* `${{ github.repository }}`
            🌿 *Branch:* `${{ github.ref_name }}`
            👤 *Author:* ${{ github.actor }}
            📝 *Commit:* `${{ github.event.head_commit.message }}`

            📂 *File yang Berubah:*
            `${{ steps.files.outputs.changed_files }}`

            🔗 *Lihat Perubahan:* [Klik di sini](${{ github.event.head_commit.url }})

      - name: ❌ Send Failure Notification
        if: failure()
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          format: markdown
          message: |
            ❌ *Deployment ke InfinityFree Gagal!*

            🚨 *Error pada:* `${{ github.repository }}`
            💬 *Pesan Commit:* `${{ github.event.head_commit.message }}`

            ⚠️ Mohon segera cek log di GitHub Actions:
            [Lihat Log Detail](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
